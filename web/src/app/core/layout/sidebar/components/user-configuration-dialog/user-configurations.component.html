<section class="user-configurations">
  <header class="user-configurations__header">
    <h1>Configurações</h1>

    <button class="close-btn" matTooltipClass="tooltip" (click)="closeDialog()">
      <i class="ri-close-line"></i>
    </button>
  </header>

  <div class="user-configurations__user-card">
    <div class="user-configurations__user-card-avatar">
      {{ this.data.nome | initials }}
    </div>

    <div class="user-configurations__user-card-info">
      <h1>{{ this.data.nome }}</h1>
      <small>{{ this.data.email }}</small>
    </div>
  </div>

  <div class="user-configurations__content">
    <form [formGroup]="form">
      <div class="name-input">
        <strong>Nome</strong>

        <mat-form-field
          class="mat-field-compact"
          [style.width.px]="450"
          appearance="outline"
        >
          <input formControlName="nome" matInput />
        </mat-form-field>

        <small>Este nome aparecerá no cabeçalho e nos cards.</small>
      </div>
    </form>
  </div>

  <div class="action-btns">
    <button (click)="closeDialog()" matTooltip="Cancelar" class="btn-cancelar">
      Cancelar
    </button>

    <button (click)="editUser()" matTooltip="Salvar" class="btn-salvar">
      Salvar
    </button>
  </div>
</section>
